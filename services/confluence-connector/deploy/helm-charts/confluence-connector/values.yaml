# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: confluence-connector
fullnameOverride: confluence-connector
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  revisionHistoryLimit: 3
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"

podLabels:
  logging.unique.app/format: pino-json

env:
  HEALTH_CONNECTIVITY_TIMEOUT_MS: "3000"
  HEALTH_SYNC_HISTORY_SIZE: "5"
  HEALTH_SYNC_TENANT_FAILURE_THRESHOLD: "0.5"
  LOG_LEVEL: info
  LOGS_DIAGNOSTICS_DATA_POLICY: conceal
  MAX_HEAP_MB: 1920
  NODE_ENV: production
  OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
  OTEL_EXPORTER_PROMETHEUS_PORT: "51350"
  OTEL_METRICS_EXPORTER: "prometheus"
  # Glob pattern to match tenant configuration YAML files
  TENANT_CONFIG_PATH_PATTERN: /app/tenant-configs/*-tenant-config.yaml

# -- Environment variables from secrets.
# Example for loading secrets (uncomment and customize as needed):
#   envVars:
#     # For Zitadel authentication (required when authMode is 'external')
#     - name: ZITADEL_CLIENT_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: confluence-connector-secret
#           key: ZITADEL_CLIENT_SECRET
#     # For Confluence OAuth 2.0 (2LO) client secret
#     - name: CONFLUENCE_CLIENT_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: confluence-connector-secret
#           key: CONFLUENCE_CLIENT_SECRET
#     # For proxy basic auth password (required when proxy.authMode is 'username_password')
#     - name: PROXY_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: confluence-connector-secret
#           key: PROXY_PASSWORD
envVars: []

image:
  registry: ghcr.io
  repository: unique-ag/connectors/services/confluence-connector
  tag: 3.0.0 # x-release-please-version
  pullPolicy: IfNotPresent

ports:
  application: 51349
  metrics: 51350

resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 1
    memory: 512Mi

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  enabled: true

volumes:
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp

# ════ Data ════════════════════════════════════════════════════════════════════

# ── InternalServices ──────────────────────────────────────────────────────────
internalServices:
  dependencies:
    ingestion:
      name: ingestion
      servicePort: 8091
      podPort: 8080
    scopeManagement:
      name: scope-management
      servicePort: 8094
      podPort: 8080

# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  enabled: false

# ── HTTPRoute ─────────────────────────────────────────────────────────────────
routes:
  hostname: "" # no HTTPRoute via base chart; connector uses custom ingress.yaml for wildcard domain support

# ════ Operations ══════════════════════════════════════════════════════════════

# ── Grafana dashboard configuration ───────────────────────────────────────────
grafana:
  dashboard:
    # -- Enable Grafana dashboard ConfigMap creation
    enabled: false
    # -- Grafana folder where the dashboard will be placed
    folder: connectors

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  additionalAlerts:
    ConfluenceConnectorUniqueAPIErrors:
      alert: ConfluenceConnectorUniqueAPIErrors
      annotations:
        summary: "Confluence Connector Unique REST API errors detected"
        description: "The Confluence Connector is experiencing Unique REST API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes (both the connector and the Unique Services)
          3. Verify network connectivity between connector and Unique Services
          4. Verify service user settings and permissions within Unique
      expr: |
        (
          sum(rate(cfc_unique_rest_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(cfc_unique_rest_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: confluence-connector

connectorConfig:
  enabled: true
  tenants:
    - name: default
      confluence:
        # -- Confluence instance type: cloud or data-center
        instanceType: cloud
        # -- Atlassian Cloud ID (UUID) for the Confluence site (required for cloud instances)
        cloudId: '{{ fail "confluence.cloudId is mandatory when instanceType is cloud. Override in your deployment values." }}'
        # -- base url of the Confluence instance
        # example (cloud): https://acme.atlassian.net
        # example (data-center): https://confluence.acme.com
        baseUrl: '{{ fail "confluence.baseUrl is mandatory. Override in your deployment values." }}'
        auth:
          # -- authentication mode
          # possible values: oauth_2lo
          mode: oauth_2lo
          # -- OAuth 2.0 (2LO) application client ID
          clientId: '{{ fail "confluence.auth.clientId is mandatory when auth.mode is oauth_2lo. Override in your deployment values." }}'
          # -- OAuth 2.0 client secret. Use "os.environ/ENV_VAR_NAME" to read from environment variable at runtime.
          # This default is overridden per-tenant in the monorepo app.yaml values.
          clientSecret: "os.environ/CONFLUENCE_CLIENT_SECRET"
        # -- Number of Confluence API requests allowed per minute
        # Atlassian recommends DC admins allow at least 20 req/s (1200 RPM). Cloud uses a points-based quota.
        apiRateLimitPerMinute: 1200
        # -- Label to trigger single-page sync
        ingestSingleLabel: ai-ingest
        # -- Label to trigger full sync of all labeled pages
        ingestAllLabel: ai-ingest-all

      unique:
        # -- communication mode for the Unique Services
        # possible values: cluster_local, external
        # cluster_local: communicates using in-cluster URLs and requires serviceExtraHeaders with x-company-id and x-user-id
        # external: communicates using external URLs and requires authentication via Zitadel
        authMode: cluster_local
        # -- base URL for the ingestion service; auto-derived from internalServices.dependencies.ingestion
        # override with an explicit URL when authMode is external, e.g. https://api.unique.app/ingestion
        ingestionServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.ingestion) }}'
        # -- base URL for the scope management service; auto-derived from internalServices.dependencies.scopeManagement
        # override with an explicit URL when authMode is external, e.g. https://api.unique.app/scope-management
        scopeManagementServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.scopeManagement) }}'
        # -- Number of Unique API requests allowed per minute
        apiRateLimitPerMinute: 100
        # -- Object containing extra HTTP headers for Unique API requests (GraphQL and REST)
        # Required when authMode is cluster_local. Must contain x-company-id and x-user-id headers.
        # example: {"x-company-id": "1234567890", "x-user-id": "1234567890"}
        serviceExtraHeaders:
          x-company-id: '{{ fail "unique.serviceExtraHeaders.x-company-id is mandatory when authMode is cluster_local. Override in your deployment values." }}'
          x-user-id: '{{ fail "unique.serviceExtraHeaders.x-user-id is mandatory when authMode is cluster_local. Override in your deployment values." }}'
        # -- Optional object containing config to pass when submitting file for ingestion
        # ingestionConfig:
        #   uniqueIngestionMode: SKIP_INGESTION
        #   customProperty: value
        # -- Zitadel authentication configuration (required when authMode is external)
        zitadel:
          # -- Zitadel client ID
          clientId: '{{ fail "unique.zitadel.clientId is mandatory when authMode is external. Override in your deployment values." }}'
          # -- Zitadel OAuth token URL
          # example: https://idp.unique.app/oauth/v2/token
          oauthTokenUrl: '{{ fail "unique.zitadel.oauthTokenUrl is mandatory when authMode is external. Override in your deployment values." }}'
          # -- Zitadel project ID
          # example: 225317577440629999
          projectId: '{{ fail "unique.zitadel.projectId is mandatory when authMode is external. Override in your deployment values." }}'

      processing:
        # -- how many pages you want to submit for ingestion into Unique at once
        concurrency: 1
        # -- cron expression for the scheduled Confluence scan interval default: every 15 minutes
        scanIntervalCron: "*/15 * * * *"
        # -- maximum number of items (pages + attachments) to scan per run (null/empty for unlimited, useful for testing)
        # maxItemsToScan: 100

      ingestion:
        # -- Ingestion traversal mode
        ingestionMode: flat
        # -- Root scope ID for ingestion
        scopeId: '{{ fail "ingestion.scopeId is mandatory. Override in your deployment values." }}'
        # -- Whether to store content internally in Unique
        storeInternally: enabled
        # -- Use v1-compatible ingestion key format (spaceId_spaceKey/pageId) without tenant prefix
        useV1KeyFormat: disabled
        # -- File attachment ingestion configuration (optional, all fields have defaults)
        # attachments:
        #   # -- Enable attachment ingestion (default: enabled)
        #   mode: enabled
        #   # -- MIME types to include, matched against the mediaType from the Confluence API
        #   # -- (default: PDF, DOCX, XLSX, PPTX, plain text, CSV, HTML, PNG, JPEG)
        #   allowedMimeTypes:
        #     - application/pdf
        #     - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        #     - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        #     - application/vnd.openxmlformats-officedocument.presentationml.presentation
        #     - text/plain
        #     - text/csv
        #     - text/html
        #     - image/png
        #     - image/jpeg
        #   # -- Maximum file size in megabytes (default: 200)
        #   maxFileSizeMb: 200
        #   # -- Auto-attach ingestionConfig.jpgReadMode = DOC_INTELLIGENCE_DEFAULT to image
        #   # -- registrations so chunks are produced without scope-side configuration
        #   # -- (default: enabled)
        #   imageOcr: enabled
        # -- Ingestion configuration applied to each ingested page. Setting
        # -- htmlConfig.imageContentExtraction.enabled to true and
        # -- htmlConfig.imageContentExtraction.languageModel to the visual LLM configured
        # -- in Knowledge Base turns on inlining of page images as base64 data URIs
        # -- (requires Unique platform 2026.24.0+); without both, images fall back to
        # -- standalone attachment ingestion.
        # pageIngestionConfig:
        #   htmlConfig:
        #     imageContentExtraction:
        #       enabled: true
        #       languageModel: AZURE_GPT_4o_2024_1120

# -- HTTP proxy configuration for external API calls
# Required for environments where internet access is only available through a proxy.
proxyConfig:
  enabled: true
  # -- Proxy authentication mode
  # none: proxy disabled
  # no_auth: proxy enabled, no authentication
  # username_password: username/password authentication
  # ssl_tls: TLS client certificate authentication
  authMode: none
  # -- Proxy server hostname (required for no_auth/username_password/ssl_tls modes)
  # host: proxy.example.com
  # -- Proxy server port (required for no_auth/username_password/ssl_tls modes)
  # port: 8080
  # -- Proxy protocol: http or https (required for no_auth/username_password/ssl_tls modes)
  # protocol: http
  # -- Basic auth username (required for username_password mode)
  # username: proxy-user
  # password is loaded from a secret, see envVars example for PROXY_PASSWORD
  # -- Path to SSL/TLS client certificate (required for ssl_tls mode)
  # sslCertPath: /app/proxy-certs/client.crt
  # -- Path to SSL/TLS client key (required for ssl_tls mode)
  # sslKeyPath: /app/proxy-certs/client.key
  # -- Path to CA bundle for verifying proxy server certificate (optional)
  # sslCaBundlePath: /app/proxy-certs/ca.crt
  # -- Optional JSON string of headers for CONNECT request
  # headers: '{"X-Proxy-Header":"value"}'

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
  baseline:
    prometheus:
      namespace: system
    egress:
      atlassian:
        toFQDNs:
          - matchPattern: "*.atlassian.net"
          - matchName: api.atlassian.com
          - matchName: auth.atlassian.com
          - matchName: api.media.atlassian.com
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
