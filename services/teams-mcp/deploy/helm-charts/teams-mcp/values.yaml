# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: teams-mcp
fullnameOverride: teams-mcp
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  revisionHistoryLimit: 3
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"

podLabels:
  logging.unique.app/format: pino-json

env:
  LOG_LEVEL: info
  MAX_HEAP_MB: 1920
  NODE_ENV: production
  OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
  OTEL_EXPORTER_PROMETHEUS_PORT: "51346"
  OTEL_METRICS_EXPORTER: "prometheus"

# -- Environment variables from secrets (required secrets listed at bottom of file)
envVars: []

image:
  registry: ghcr.io
  repository: unique-ag/connectors/services/teams-mcp
  tag: 0.3.5 # x-release-please-version
  pullPolicy: IfNotPresent

ports:
  application: 51345
  metrics: 51346

resources:
  # Resources are granted generously as the service for now is a singleton.
  # ephemeral-storage covers the disk spool: recordings are uploaded by streaming
  # the download to a temp file in /tmp (see UniqueContentService.uploadToStorage),
  # and the ingestion consumer runs at prefetchCount: 1 so at most one ~5 GB
  # recording is spooled at a time.
  limits:
    memory: 2048Mi
    ephemeral-storage: 10Gi # >= the emptyDir cap; covers one ~5 GB spool + overlay/log overhead
  requests:
    cpu: 1
    memory: 1984Mi
    ephemeral-storage: 6Gi # reserve enough to guarantee one ~5 GB recording can spool

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  enabled: true

volumes:
  - name: tmp
    emptyDir:
      sizeLimit: 10Gi # one ~5 GB recording at a time (prefetch:1) + headroom

volumeMounts:
  - name: tmp
    mountPath: /tmp

# ════ Data ════════════════════════════════════════════════════════════════════

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  connection:
    sslMode: verify
    # ── Use-case B — in-cluster PostgreSQL (CloudNativePG) ────────────────────
    #
    # host:
    #   fromKubernetesService:
    #     name: <release-name>-pg-cluster-rw
    #     namespace: <namespace>
    #     port: 5432
    #     podPort: 5432
    #     podSelectorLabels:
    #       cnpg.io/cluster: <release-name>-pg-cluster
    #
    # url:
    #   fromSecret:
    #     name: <release-name>-pg-cluster-app
    #     key: fqdn-uri

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
rabbitmq:
  enabled: true
  connection: {}
  # ── Use-case B — in-cluster RabbitMQ (Bitnami Helm release) ──────────────
  #
  # host:
  #   fromKubernetesService:
  #     name: <helm-release>-<nameOverride>-headless
  #     namespace: <namespace>
  #     port: 5672
  #     podPort: 5672
  #     podSelectorLabels:
  #       app.kubernetes.io/instance: <helm-release>
  # username:
  #   fromSecret:
  #     name: rabbitmq-cluster-service-binding
  #     key: AMQP_USERNAME
  # password:
  #   fromSecret:
  #     name: rabbitmq-cluster-service-binding
  #     key: AMQP_PASSWORD
  #
  # ── Use-case C — in-cluster RabbitMQ Cluster Operator ─────────────────────
  #
  # host:
  #   fromKubernetesService:
  #     name: <rabbitmqcluster-name>
  #     namespace: <namespace>
  #     port: 5672
  #     podPort: 5672
  #     podSelectorLabels:
  #       app.kubernetes.io/component: rabbitmq
  #       app.kubernetes.io/name: <rabbitmqcluster-name>
  # username:
  #   fromSecret:
  #     name: rabbitmq-cluster-chat-service-binding
  #     key: AMQP_USERNAME
  # password:
  #   fromSecret:
  #     name: rabbitmq-cluster-chat-service-binding
  #     key: AMQP_PASSWORD

# ── InternalServices ──────────────────────────────────────────────────────────
internalServices:
  dependencies:
    chat:
      name: chat
      servicePort: 8093
      podPort: 8080
    ingestion:
      name: ingestion
      servicePort: 8091
      podPort: 8080
  dependents:
    ingressGateway:
      name: gateway
      namespace: system

# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  port: 80

routes:
  hostname: "" # no HTTPRoute via base chart; MCP uses custom ingress.yaml for wildcard domain support

# ── Ingress ───────────────────────────────────────────────────────────────────
# MCP servers need to be hosted on their own domain. With Kong as current controller, it is easier to use
# ingress than http routes to obtain 'wildcard' domains.
ingress:
  # -- Enable ingress resource creation
  enabled: false
  # -- Ingress class name (e.g., nginx, traefik)
  ingressClassName: kong
  # -- Additional labels for the ingress resource
  additionalLabels: {}
  # -- Annotations for the ingress resource
  annotations:
    konghq.com/plugins: unique-route-metrics
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  # -- Ingress hosts configuration
  hosts: []
    # - host: teams.mcp.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
    #       # serviceName: custom-service  # optional, defaults to chart fullname
    #       # servicePort: http            # optional, defaults to "http"
  # -- TLS configuration for the ingress
  tls: []
    # - secretName: teams-mcp-tls
    #   hosts:
    #     - teams.mcp.example.com

# ════ Operations ══════════════════════════════════════════════════════════════

# ── Job (migration hook) ──────────────────────────────────────────────────────
hooks:
  migration:
    enabled: true
    command: |
      pnpm run db:migrate

# ── Grafana dashboard configuration ───────────────────────────────────────────
grafana:
  dashboard:
    # -- Enable Grafana dashboard ConfigMap creation
    enabled: true
    # -- Grafana folder where the dashboard will be placed
    folder: mcp-servers

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  additionalAlerts:
    TeamsMcpGraphQLErrors:
      alert: TeamsMcpGraphQLErrors
      annotations:
        summary: "Teams MCP GraphQL API errors detected"
        description: "The Teams MCP server is experiencing GraphQL API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes
          3. Verify network connectivity between MCP server and GraphQL API
          4. Verify authentication credentials and token validity
          5. Check for rate limiting or throttling issues
      expr: |
        (
          sum(rate(teams_mcp_unique_graphql_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(teams_mcp_unique_graphql_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: teams-mcp
    TeamsMcpUniqueAPIErrors:
      alert: TeamsMcpUniqueAPIErrors
      annotations:
        summary: "Teams MCP Unique REST API errors detected"
        description: "The Teams MCP server is experiencing Unique REST API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes (both the MCP server and the Unique Services)
          3. Verify network connectivity between MCP server and Unique Services
          4. Verify service user settings and permissions within Unique
      expr: |
        (
          sum(rate(teams_mcp_unique_rest_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(teams_mcp_unique_rest_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: teams-mcp

# -- Configuration for the deployed Teams MCP Server, will be mapped to environment variables
mcpConfig:
  enabled: true

  # -- Application configuration
  app:
    # -- The URL of the MCP Server. Used for OAuth callbacks.
    # The URL must be reachable from the redirect location, e.g. must be publicly accessible.
    # example: https://teams.mcp.unique.app
    selfUrl: '{{ fail "mcpConfig.app.selfUrl is mandatory. Override in your deployment values." }}'

  # -- Microsoft Graph API configuration
  microsoft:
    # -- The client ID of the Microsoft App Registration
    # example: 12345678-1234-1234-1234-123456789012
    clientId: '{{ fail "mcpConfig.microsoft.clientId is mandatory. Override in your deployment values." }}'
    # -- The public webhook URL reachable from external network for Microsoft Graph subscriptions.
    # Optional - defaults to SELF_URL if not provided.
    # example: https://teams.mcp.unique.app
    # publicWebhookUrl: ""
    # -- When enabled, automatically enqueue a transcript subscription for every user at login
    # (skips the start_kb_integration tool).
    autoStartIngestion: false
    # clientSecret is loaded from a secret, see envVars
    # webhookSecret is loaded from a secret, see envVars

  # -- Unique API configuration
  unique:
    # -- Enable Unique knowledge-base integration (transcript ingestion).
    # When disabled, chat tools work without Unique/Zitadel configuration.
    # possible values: enabled, disabled
    integration: enabled
    # -- Authentication mode for Unique API services
    # possible values: cluster_local, external
    # cluster_local: communicates using in-cluster URLs with service headers
    # external: communicates using external URLs with app key authentication
    serviceAuthMode: cluster_local
    # -- Extra headers to send with requests to Unique API services (JSON string)
    # For cluster_local mode: '{"x-company-id": "...", "x-user-id": "..."}'
    serviceExtraHeaders: {}
    # For external mode:
    # serviceExtraHeaders:
    #   authorization: "Bearer ..."
    #   x-app-id: "..."
    #   x-user-id: "..."
    #   x-company-id: "..."

    # -- The Public API URL; auto-derived from internalServices.dependencies.chat with /public/ suffix
    # override with an explicit URL when serviceAuthMode is external, e.g. https://gateway.unique.app/public/chat/
    apiBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.chat) }}/public/'
    # -- The Public API version to use
    apiVersion: "2023-12-06"
    # -- The root scope ID under which to create transcript and recording folders
    # Required when integration is enabled
    # @default -- (required when integration=enabled)
    rootScopeId: ""
    # -- Concurrency limit for fetching users when resolving scope accesses
    userFetchConcurrency: 5

    # -- Base URL for Unique ingestion service; auto-derived from internalServices.dependencies.ingestion
    # override with an explicit URL when serviceAuthMode is external, e.g. https://api.unique.app/ingestion
    ingestionServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.ingestion) }}'

  # -- Authentication configuration for the MCP server
  auth:
    # -- Access token expiration time in seconds
    accessTokenExpiresInSeconds: 60
    # -- Refresh token expiration time in seconds (default: 30 days)
    refreshTokenExpiresInSeconds: 2592000
    # hmacSecret is loaded from a secret, see envVars

  # Note: The following secrets must be provided via envVars:
  # - MICROSOFT_CLIENT_SECRET: Microsoft App Registration client secret
  # - MICROSOFT_WEBHOOK_SECRET: 128 character random string for webhook validation
  # - AUTH_HMAC_SECRET: Secret key for signing HMAC tokens
  # - ENCRYPTION_KEY: 32-byte (256-bit) secret for AES-256-GCM encryption (hex or base64)

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
  baseline:
    prometheus:
      namespace: system
    egress:
      microsoft:
        toFQDNs:
          - matchName: login.microsoftonline.com
          - matchName: graph.microsoft.com
          - matchPattern: "*.microsoft.com"
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
