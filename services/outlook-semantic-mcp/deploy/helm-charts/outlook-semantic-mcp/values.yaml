# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: outlook-semantic-mcp
fullnameOverride: outlook-semantic-mcp
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  revisionHistoryLimit: 3
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"

podLabels:
  logging.unique.app/format: pino-json

env:
  LOG_LEVEL: info
  MAX_HEAP_MB: 850
  NODE_ENV: production
  OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
  OTEL_EXPORTER_PROMETHEUS_PORT: "51346"
  OTEL_METRICS_EXPORTER: "prometheus"
  OTEL_EXPORTER_OTLP_ENDPOINT:
    if: '{{ .Values.internalServices.dependencies.otelTraces.enabled }}'
    value: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.otelTraces) }}'
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:
    if: '{{ .Values.internalServices.dependencies.otelTraces.enabled }}'
    value: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.otelTraces) }}/v1/traces'

# -- Environment variables from secrets.
# Example for loading secrets (uncomment and customize as needed):
#   envVars:
#     # For Zitadel authentication (required when authMode is 'external')
#     - name: UNIQUE_ZITADEL_CLIENT_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: outlook-semantic-mcp-zitadel-secret
#           key: UNIQUE_ZITADEL_CLIENT_SECRET
envVars: []

# -- ConfigMap(s) to load environment variables from.
# Default assumes release name is "outlook-semantic-mcp" (i.e., base.fullname resolves to "outlook-semantic-mcp").
# Override with [<your-fullname>-config] if using a different release name or fullnameOverride.
extraEnvCM:
  - outlook-semantic-mcp-config

image:
  registry: ghcr.io
  repository: unique-ag/connectors/services/outlook-semantic-mcp
  tag: 2.0.2 # x-release-please-version
  pullPolicy: IfNotPresent

ports:
  application: 51345
  metrics: 51346

resources:
  # Resources are granted generously as the service for now is a singleton
  limits:
    memory: 1Gi
  requests:
    cpu: 1
    memory: 512Mi

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  enabled: true

volumes:
  - name: tmp
    emptyDir:
      sizeLimit: 20Gi

volumeMounts:
  - name: tmp
    mountPath: /tmp

# ════ Data ════════════════════════════════════════════════════════════════════

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  connection:
    sslMode: verify
    # ── Use-case B — in-cluster PostgreSQL (CloudNativePG) ────────────────────
    #
    # host:
    #   fromKubernetesService:
    #     name: <release-name>-pg-cluster-rw
    #     namespace: <namespace>
    #     port: 5432
    #     podPort: 5432
    #     podSelectorLabels:
    #       cnpg.io/cluster: <release-name>-pg-cluster
    #
    # url:
    #   fromSecret:
    #     name: <release-name>-pg-cluster-app
    #     key: fqdn-uri

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
rabbitmq:
  enabled: true
  connection: {}
  # ── Use-case B — in-cluster RabbitMQ (Bitnami Helm release) ──────────────
  #
  # host:
  #   fromKubernetesService:
  #     name: <helm-release>-<nameOverride>-headless
  #     namespace: <namespace>
  #     port: 5672
  #     podPort: 5672
  #     podSelectorLabels:
  #       app.kubernetes.io/instance: <helm-release>
  # username:
  #   fromSecret:
  #     name: rabbitmq-cluster-service-binding
  #     key: AMQP_USERNAME
  # password:
  #   fromSecret:
  #     name: rabbitmq-cluster-service-binding
  #     key: AMQP_PASSWORD
  #
  # ── Use-case C — in-cluster RabbitMQ Cluster Operator ─────────────────────
  #
  # host:
  #   fromKubernetesService:
  #     name: <rabbitmqcluster-name>
  #     namespace: <namespace>
  #     port: 5672
  #     podPort: 5672
  #     podSelectorLabels:
  #       app.kubernetes.io/component: rabbitmq
  #       app.kubernetes.io/name: <rabbitmqcluster-name>
  # username:
  #   fromSecret:
  #     name: rabbitmq-cluster-chat-service-binding
  #     key: AMQP_USERNAME
  # password:
  #   fromSecret:
  #     name: rabbitmq-cluster-chat-service-binding
  #     key: AMQP_PASSWORD

# ── InternalServices ──────────────────────────────────────────────────────────
internalServices:
  dependencies:
    ingestion:
      name: ingestion
      servicePort: 8091
      podPort: 8080
    otelTraces:
      enabled: false
      name: otel-traces
      servicePort: 4318
    scopeManagement:
      name: scope-management
      servicePort: 8094
      podPort: 8080
  dependents:
    ingressGateway:
      name: gateway
      namespace: system
# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  port: 80

routes:
  hostname: "" # no HTTPRoute via base chart; MCP uses custom ingress.yaml for wildcard domain support

# ── Ingress ───────────────────────────────────────────────────────────────────
# MCP servers need to be hosted on their own domain. With Kong as current controller, it is easier to use
# ingress than http routes to obtain 'wildcard' domains.
ingress:
  # -- Enable ingress resource creation
  enabled: false
  # -- Ingress class name (e.g., nginx, traefik)
  ingressClassName: kong
  # -- Additional labels for the ingress resource
  additionalLabels: {}
  # -- Annotations for the ingress resource
  annotations:
    konghq.com/plugins: unique-route-metrics
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  # -- Ingress hosts configuration
  hosts: []
    # - host: outlook.mcp.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
    #       # serviceName: custom-service  # optional, defaults to chart fullname
    #       # servicePort: http            # optional, defaults to "http"
  # -- TLS configuration for the ingress
  tls: []
    # - secretName: outlook-semantic-mcp-tls
    #   hosts:
    #     - outlook.mcp.example.com

# ════ Operations ══════════════════════════════════════════════════════════════

# ── Job (migration hook) ──────────────────────────────────────────────────────
hooks:
  migration:
    enabled: true
    command: |
      pnpm run db:migrate

# ── Grafana dashboard configuration ───────────────────────────────────────────
grafana:
  dashboard:
    # -- Enable Grafana dashboard ConfigMap creation
    enabled: true
    # -- Grafana folder where the dashboard will be placed
    folder: mcp-servers

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  additionalAlerts:
    OutlookSemanticMcpGraphQLErrors:
      alert: OutlookSemanticMcpGraphQLErrors
      annotations:
        summary: "Outlook Semantic MCP GraphQL API errors detected"
        description: "The Outlook Semantic MCP server is experiencing GraphQL API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes
          3. Verify network connectivity between MCP server and GraphQL API
          4. Verify authentication credentials and token validity
          5. Check for rate limiting or throttling issues
      expr: |
        (
          sum(rate(outlook_semantic_mcp_unique_graphql_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(outlook_semantic_mcp_unique_graphql_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: outlook-semantic-mcp
    OutlookSemanticMcpUniqueAPIErrors:
      alert: OutlookSemanticMcpUniqueAPIErrors
      annotations:
        summary: "Outlook Semantic MCP Unique REST API errors detected"
        description: "The Outlook Semantic MCP server is experiencing Unique REST API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes (both the MCP server and the Unique Services)
          3. Verify network connectivity between MCP server and Unique Services
          4. Verify service user settings and permissions within Unique
      expr: |
        (
          sum(rate(outlook_semantic_mcp_unique_rest_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(outlook_semantic_mcp_unique_rest_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: outlook-semantic-mcp

# -- Configuration for the deployed Outlook Semantic MCP Server, will be mapped to environment variables
# Users preferring setting all variables by hand disable the enabled flag and set the extraEnvCM to []
mcpConfig:
  # -- if disabled, extraEnvCM must be set to []
  enabled: true

  # -- Application configuration
  app:
    # -- The URL of the MCP Server. Used for OAuth callbacks.
    # The URL must be reachable from the redirect location, e.g. must be publicly accessible.
    # example: https://outlook.mcp.unique.app
    selfUrl: '{{ fail "mcpConfig.app.selfUrl is mandatory. Override in your deployment values." }}'
    # -- Debug mode for the MCP server. Set to "enabled" to expose:
    #    1. Debugging tools
    #    2. Extra debugging data in tool responses.
    mcpDebugMode: disabled
    # -- Search backend. microsoft_graph_and_unique_api: dual backend, KB ingestion + semantic search (default).
    # microsoft_graph: direct Graph search, no ingestion, sync tools not registered.
    mcpBackend: microsoft_graph_and_unique_api
    # -- Optional. Cron schedule for syncing mail folder structure for all active subscriptions.
    # Default: '*/5 * * * *'. Env var: DIRECTORY_SYNC_CRON_SCHEDULE
    # directorySyncCronSchedule: '*/5 * * * *'
    # -- Optional. Buffer logs before writing. Set to 'disabled' only for startup debugging. Default: 'enabled'. Env var: LOGS_BUFFERING
    # logsBuffering: disabled
    # -- Optional. Controls whether diagnostic data is smeared or disclosed in logs. Default: 'conceal'. Env var: LOGS_DIAGNOSTICS_DATA_POLICY
    # logsDiagnosticsDataPolicy: conceal

  # -- Delegated access configuration. Controls whether the service discovers shared mailbox access.
  delegatedAccess:
    # -- Scanning mode. Values: disabled | full_access_only | granular_access
    #   disabled         - delegated access scanning is off (default)
    #   full_access_only - discovers Full Access (Read & Manage) delegation via /messages endpoint
    #   granular_access  - discovers folder-level delegation via /mailFolders endpoint + runs verification
    # Env var: DELEGATED_ACCESS_SCAN
    scan: disabled
    # -- Cron schedule for delegated access discovery runs.
    # Required when scan is not 'disabled'. Env var: DELEGATED_ACCESS_DISCOVERY_CRON_SCHEDULE
    # discoveryCronSchedule: '0 */12 * * *'
    # -- Cron schedule for delegated access verification runs.
    # Required when scan is 'granular_access'. Env var: DELEGATED_ACCESS_VERIFICATION_CRON_SCHEDULE
    # verificationCronSchedule: '0 */4 * * *'
    # -- Cron schedule for recovering stuck delegated access discovery and verification jobs.
    # Active when scan is not 'disabled'. Env var: DELEGATED_ACCESS_RECOVERY_CRON_SCHEDULE
    # recoveryCronSchedule: '*/30 * * * *'
    # -- Optional. Hours after which a delegated access account is considered stale for health checks.
    # Default: 24. Env var: DELEGATED_ACCESS_STALENESS_THRESHOLD_HOURS
    # stalenessThresholdHours: 24
    # -- Optional. Fraction (0–1) of eligible delegated users that may be stale before health is marked down.
    # Default: 0.15. Env var: DELEGATED_ACCESS_FAILURE_THRESHOLD
    # failureThreshold: 0.15
    # -- Optional. Comma-separated list of shared mailbox email addresses to sync.
    # Required when shared mailbox directory sync is needed. Env var: DELEGATED_ACCESS_SHARED_MAILBOX_EMAILS
    # sharedMailboxEmails: "mailbox1@example.com,mailbox2@example.com"
    # -- Optional. Cron schedule for shared mailbox sync. Default: every 6 hours.
    # Env var: DELEGATED_ACCESS_SHARED_MAILBOX_SYNC_CRON_SCHEDULE
    # sharedMailboxSyncCronSchedule: "0 */6 * * *"

  # -- Ingestion backend configuration.
  # Required when mcpBackend is 'microsoft_graph_and_unique_api'. Omit entirely for 'microsoft_graph'.
  ingestion:
    # -- Required. Default mail filters applied when creating a new inbox configuration.
    # retentionWindowInDays: limits sync to emails received within the last N days (rolling).
    # Env var: INGESTION_DEFAULT_MAIL_FILTERS (JSON string)
    defaultMailFilters:
      retentionWindowInDays: 95
      ignoredContents: []
      ignoredSenders: []
    # -- Optional. Overlapping window (minutes) for standard live catch-up sync runs.
    # Minimum: 2. Default: 3. Env var: INGESTION_LIVE_CATCHUP_OVERLAPPING_WINDOW_MINUTES
    # liveCatchupOverlappingWindowMinutes: 3
    # -- Optional. Overlapping window (minutes) for live catch-up ready-recheck runs.
    # Minimum: 10. Default: 10. Env var: INGESTION_LIVE_CATCHUP_RECHECK_OVERLAPPING_WINDOW_MINUTES
    # liveCatchupRecheckOverlappingWindowMinutes: 10
    # -- Optional. Cron schedule for stuck full-sync recovery scans.
    # Default: '*/2 * * * *'. Env var: INGESTION_FULL_SYNC_RECOVERY_CRON
    # fullSyncRecoveryCron: "*/2 * * * *"
    # -- Optional. Cron schedule for stuck live catch-up recovery scans.
    # Default: '*/5 * * * *'. Env var: INGESTION_LIVE_CATCHUP_RECOVERY_CRON
    # liveCatchupRecoveryCron: "*/5 * * * *"
    # -- Optional. Cron schedule for subscription-user live catch-up ready-recheck runs.
    # Default: '*/10 * * * *'. Env var: INGESTION_LIVE_CATCHUP_OAUTH_USERS_RECHECK_CRON
    # liveCatchupOauthUsersRecheckCron: "*/10 * * * *"
    # -- Optional. Cron schedule for shared-mailbox live catch-up ready-recheck runs.
    # Default: '*/10 * * * *'. Env var: INGESTION_LIVE_CATCHUP_SHARED_MAILBOX_RECHECK_CRON
    # liveCatchupSharedMailboxRecheckCron: "*/10 * * * *"
    # -- Optional. Cron schedule for stuck inbox deletion recovery scans.
    # Default: '*/5 * * * *'. Env var: INGESTION_DELETE_INBOX_RECOVERY_CRON
    # deleteInboxRecoveryCron: "*/5 * * * *"
    # -- Optional. Timeout in milliseconds for connectivity health checks (ping to Graph API).
    # Default: 3000. Env var: INGESTION_CONNECTIVITY_TIMEOUT_MS
    # connectivityTimeoutMs: 3000
    # -- Optional. Fraction (0–1) of eligible users that may be failing fullSync or liveCatchup before health is marked down.
    # Default: 0.15. Env var: INGESTION_SYNC_FAILURE_THRESHOLD
    # syncFailureThreshold: 0.15

  # -- Microsoft Graph API configuration
  microsoft:
    # -- The client ID of the Microsoft App Registration
    # example: 12345678-1234-1234-1234-123456789012
    clientId: '{{ fail "mcpConfig.microsoft.clientId is mandatory. Override in your deployment values." }}'
    # -- The public webhook URL reachable from external network for Microsoft Graph subscriptions.
    # Optional - defaults to SELF_URL if not provided.
    # example: https://outlook.mcp.unique.app
    # publicWebhookUrl: ""
    # -- Optional. Hour of day in UTC when scheduled subscription expirations should occur (0-23). To override:
    # subscriptionExpirationTimeHoursUTC: 3
    # Or set env var directly: MICROSOFT_SUBSCRIPTION_EXPIRATION_TIME_HOURS_UTC=3
    # clientSecret is loaded from a secret, see envVars
    # webhookSecret is loaded from a secret, see envVars

  # -- Unique API configuration
  unique:
    # -- Authentication mode for Unique API services
    # possible values: cluster_local, external
    # cluster_local: communicates using in-cluster URLs with service headers
    # external: communicates using external URLs with app key authentication
    serviceAuthMode: cluster_local
    # -- Extra headers to send with requests to Unique API services (JSON string)
    # For cluster_local mode: '{"x-company-id": "...", "x-user-id": "..."}'
    serviceExtraHeaders: {}
    # Note: external mode does NOT use serviceExtraHeaders.
    # It authenticates via Zitadel OAuth (see zitadel section below).

    # -- Base URL for Unique ingestion service; auto-derived from internalServices.dependencies.ingestion
    # override with an explicit URL when serviceAuthMode is external, e.g. https://api.unique.app/ingestion
    ingestionServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.ingestion) }}'

    # -- Base URL for Unique scope management; auto-derived from internalServices.dependencies.scopeManagement
    # override with an explicit URL when serviceAuthMode is external, e.g. https://api.unique.app/scope-management
    scopeManagementServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.scopeManagement) }}'

    # -- Optional. Whether to store emails internally in the Unique knowledge base. To override:
    # storeInternally: enabled
    # Or set env var directly: UNIQUE_STORE_INTERNALLY=enabled

    # Zitadel config
    zitadel:
      clientId: '{{ fail "mcpConfig.unique.zitadel.clientId is mandatory when serviceAuthMode is external. Override in your deployment values." }}'
      oauthTokenUrl: '{{ fail "mcpConfig.unique.zitadel.oauthTokenUrl is mandatory when serviceAuthMode is external. Override in your deployment values." }}'
      projectId: '{{ fail "mcpConfig.unique.zitadel.projectId is mandatory when serviceAuthMode is external. Override in your deployment values." }}'

  # -- Authentication configuration for the MCP server
  # Optional. Access and refresh token expiration times. To override:
  # auth:
  #   accessTokenExpiresInSeconds: 60          # zod default: 60
  #   refreshTokenExpiresInSeconds: 2592000    # zod default: 2592000 (30 days)
  # Or set env vars directly:
  #   AUTH_ACCESS_TOKEN_EXPIRES_IN_SECONDS=60
  #   AUTH_REFRESH_TOKEN_EXPIRES_IN_SECONDS=2592000
  # hmacSecret is loaded from a secret, see envVars

  # Note: The following secrets must be provided via envVars:
  # - MICROSOFT_CLIENT_SECRET: Microsoft App Registration client secret
  # - MICROSOFT_WEBHOOK_SECRET: 128 character random string for webhook validation
  # - AUTH_HMAC_SECRET: Secret key for signing HMAC tokens
  # - ENCRYPTION_KEY: 32-byte (256-bit) secret for AES-256-GCM encryption (hex or base64)

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
  baseline:
    prometheus:
      namespace: system
    egress:
      microsoft:
        toFQDNs:
          - matchName: login.microsoftonline.com
          - matchName: graph.microsoft.com
          - matchPattern: "*.microsoft.com"
          - matchName: outlook.office.com
          - matchName: outlook.office365.com
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
