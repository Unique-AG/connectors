# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: sharepoint-connector
fullnameOverride: sharepoint-connector
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  revisionHistoryLimit: 3
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"

podLabels:
  logging.unique.app/format: pino-json

env:
  LOG_LEVEL: info
  LOGS_DIAGNOSTICS_DATA_POLICY: conceal
  # When to emit config diagnostics logs. JSON object with emit: "on"/"off" and required events array when "on".
  LOGS_DIAGNOSTICS_CONFIG_EMIT_POLICY: '{"emit":"on","events":["on_startup","on_sync"]}'
  MAX_FILE_SIZE_BYTES: "209715200"
  MAX_HEAP_MB: 1920
  NODE_ENV: production
  OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
  OTEL_EXPORTER_PROMETHEUS_PORT: "51346"
  OTEL_METRICS_EXPORTER: "prometheus"
  # Glob pattern to match tenant configuration YAML files
  TENANT_CONFIG_PATH_PATTERN: /app/tenant-configs/*-tenant-config.yaml

# -- Environment variables from secrets.
# Example for loading secrets (uncomment and customize as needed):
#   envVars:
#     # For Zitadel authentication (required when authMode is 'external')
#     - name: ZITADEL_CLIENT_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: sharepoint-connector-secret
#           key: ZITADEL_CLIENT_SECRET
#     # For encrypted certificate private key (optional, only if key is password-protected)
#     - name: SHAREPOINT_AUTH_PRIVATE_KEY_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: sharepoint-connector-secret
#           key: SHAREPOINT_AUTH_PRIVATE_KEY_PASSWORD
#     # For proxy basic auth password (required when proxy.authMode is 'username_password')
#     - name: PROXY_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: sharepoint-connector-secret
#           key: PROXY_PASSWORD
envVars: []

image:
  registry: ghcr.io
  repository: unique-ag/connectors/services/sharepoint-connector
  tag: 3.1.0 # x-release-please-version
  pullPolicy: IfNotPresent

ports:
  application: 51345
  metrics: 51346

resources:
  # Resources are granted generously as the service for now is a singleton
  limits:
    memory: 2048Mi
  requests:
    cpu: 1
    memory: 1984Mi

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /probe
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  enabled: true

workloadIdentity:
  azure:
    enabled: true
    clientId: unset_default_value

volumes:
  - name: tmp
    emptyDir: {}
  # -- Graph/SharePoint Certificate Secret
  # by default the chart expects the certificate to be in a secret named sharepoint-connector-secret under the key key.pem
  # Users can supersede this with their own secret that contains the certificate under a different key or use their own secret name
  # Users must also set the connectorConfig.sharepoint.auth.privateKeyPath to the path of the certificate in the secret
  - name: sharepoint-connector-secret
    secret:
      secretName: sharepoint-connector-secret
      items:
        - key: key.pem
          path: key.pem
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: sharepoint-connector-secret
    mountPath: /app/key.pem
    subPath: key.pem
    readOnly: true

# ════ Data ════════════════════════════════════════════════════════════════════

# ── InternalServices ──────────────────────────────────────────────────────────
internalServices:
  dependencies:
    ingestion:
      name: ingestion
      servicePort: 8091
      podPort: 8080
    scopeManagement:
      name: scope-management
      servicePort: 8094
      podPort: 8080

# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  enabled: false

# ── HTTPRoute ─────────────────────────────────────────────────────────────────
routes:
  hostname: "" # no HTTPRoute via base chart; connector uses custom ingress.yaml for wildcard domain support

# ════ Operations ══════════════════════════════════════════════════════════════

# ── Grafana dashboard configuration ───────────────────────────────────────────
grafana:
  dashboard:
    # -- Enable Grafana dashboard ConfigMap creation
    enabled: false
    # -- Grafana folder where the dashboard will be placed
    folder: connectors

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  additionalAlerts:
    SharepointConnectorGraphQLErrors:
      alert: SharepointConnectorGraphQLErrors
      annotations:
        summary: "SharePoint Connector GraphQL API errors detected"
        description: "The SharePoint Connector is experiencing GraphQL API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes
          3. Verify network connectivity between connector and GraphQL API
          4. Verify authentication credentials and token validity
          5. Check for rate limiting or throttling issues
      expr: |
        (
          sum(rate(spc_unique_graphql_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(spc_unique_graphql_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: sharepoint-connector
    SharepointConnectorSyncDegraded:
      alert: SharepointConnectorSyncDegraded
      annotations:
        summary: "SharePoint Connector sync degraded"
        description: "Site sync failure ratio over ~5 cycles exceeded 50%. Current: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check the failure_step label to identify where the sync failed
          3. Verify SharePoint connectivity and permissions
      expr: |
        (
          sum(rate(spc_sync_duration_seconds_count{result="failure",sync_type="site"}[75m]))
          /
          sum(rate(spc_sync_duration_seconds_count{sync_type="site"}[75m]))
        ) > 0.5
      for: 15m
      labels:
        severity: warning
        alertGroup: sharepoint-connector
    SharepointConnectorUniqueAPIErrors:
      alert: SharepointConnectorUniqueAPIErrors
      annotations:
        summary: "SharePoint Connector Unique REST API errors detected"
        description: "The SharePoint Connector is experiencing Unique REST API errors (4xx/5xx responses). Current error rate: {{ $value | humanizePercentage }}."
        runbook: |
          1. Inspect application logs for specific error messages
          2. Check for recent deployments or configuration changes (both the connector and the Unique Services)
          3. Verify network connectivity between connector and Unique Services
          4. Verify service user settings and permissions within Unique
      expr: |
        (
          sum(rate(spc_unique_rest_api_request_duration_seconds_count{http_status_class=~"4xx|5xx"}[5m]))
          /
          sum(rate(spc_unique_rest_api_request_duration_seconds_count[5m]))
        ) > 0.01
      for: 30s
      labels:
        severity: warning
        alertGroup: sharepoint-connector

# -- Config for the deployed connector, will be mapped to the connectors environment variables.
# Users preferring setting all variables on their own disable the enabled flag and remove the
# tenant-config from volumes and volumeMounts.
connectorConfig:
  enabled: true
  sharepoint:
    # -- tenant id against which the graph api calls are made
    # example: 12345678-1234-1234-1234-123456789012
    tenantId: '{{ fail "connectorConfig.sharepoint.tenantId is mandatory. Override in your deployment values." }}'
    # -- base url of the sharepoint instance
    # example: https://acme.sharepoint.com
    baseUrl: '{{ fail "connectorConfig.sharepoint.baseUrl is mandatory. Override in your deployment values." }}'
    auth:
      # -- authentication mode
      # possible values: certificate
      mode: certificate
      # -- Azure AD application client ID
      # example: 00000000-0000-0000-0000-000000000000
      # The matching certificate (private key file) must be sourced and mounted from a secret
      clientId: '{{ fail "connectorConfig.sharepoint.auth.clientId is mandatory when auth.mode is certificate. Override in your deployment values." }}'
      # -- path to the private key file of the Azure AD application certificate in PEM format
      # this closely relates to the volumeMounts and volume definitions
      # users wanting to use another path can override this value and unset the volumeMounts and
      # volume definitions
      # if the key is encrypted, the password must be via a secret into a SHAREPOINT_AUTH_PRIVATE_KEY_PASSWORD environment variable
      privateKeyPath: /app/key.pem
      # -- SHA1 thumbprint of the Azure AD application certificate
      # users of the sharepoint-connector-secrets terraform module can get this from the modules outputs (thumbprint_sha1)
      # users that provision their application registration manually can get this from the Azure portal
      thumbprintSha1: ""
      # One of thumbprintSha1 or thumbprintSha256 must be provided
      thumbprintSha256: ""
    # -- Rate limiting for Graph API requests per minute (in thousands)
    apiRateLimitPerMinuteThousands: 780
    # -- Deployment-level defaults applied to every site (config_file rows or
    # sharepoint_list rows). Per-site values always win when set; empty/blank
    # values fall through to these defaults. Any field except siteId may be
    # defaulted here. Leave as `{}` to keep today's behaviour where every
    # field is supplied per-site.
    # Example:
    # siteDefaults:
    #   syncColumnName: FinanceGPTKnowledge
    #   ingestionMode: recursive
    #   scopeId: scope_default
    #   maxFilesToIngest: 1000
    #   storeInternally: enabled
    #   syncStatus: active
    #   syncMode: content_only
    #   permissionsInheritanceMode: inherit_scopes_and_files
    #   subsitesScan: disabled
    siteDefaults: {}
    # -- Sites source configuration
    # Determines how sites are configured: from static YAML (config_file) or dynamically from SharePoint list (sharepoint_list)
    # possible values: config_file, sharepoint_list
    sitesSource: config_file
    # -- SharePoint list configuration (only used when sitesSource is "sharepoint_list")
    # siteId: SharePoint site ID containing the configuration list
    # listId: GUID of the SharePoint configuration list
    # sharepointList:
    #   siteId: 00000000-0000-0000-0000-000000000000
    #   listId: 00000000-0000-0000-0000-000000000000
    # -- Array of sites to sync. Each site has its own configuration.
    # Only used when sitesSource is "config_file"
    # sites:
    #   - siteId: 00000000-0000-0000-0000-000000000000
    #     syncColumnName: FinanceGPTKnowledge
    #     ingestionMode: recursive
    #     scopeId: scope_example123456789
    #     maxFilesToIngest: 1000
    #     storeInternally: enabled
    #     syncStatus: active
    #     syncMode: content_and_permissions
    #     permissionsInheritanceMode: inherit_scopes_and_files
    #     subsitesScan: disabled

  unique:
    # -- communication mode for the Unique Services
    # possible values: cluster_local, external
    # cluster_local: communicates using in-cluster URLs and requires serviceExtraHeaders with x-company-id and x-user-id
    # external: communicates using external URLs and requires authentication via Zitadel
    authMode: cluster_local
    # -- base URL for the ingestion service; auto-derived from internalServices.dependencies.ingestion
    # override with an explicit URL when authMode is external, e.g. https://api.unique.app/ingestion
    ingestionServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.ingestion) }}'
    # -- base URL for the scope management service; auto-derived from internalServices.dependencies.scopeManagement
    # override with an explicit URL when authMode is external, e.g. https://api.unique.app/scope-management
    scopeManagementServiceBaseUrl: '{{ include "base.internalService.url" (dict "root" . "dep" .Values.internalServices.dependencies.scopeManagement) }}'
    # -- Number of Unique API requests allowed per minute
    apiRateLimitPerMinute: 100
    # -- Object containing extra HTTP headers for Unique API requests (GraphQL and REST)
    # Required when authMode is cluster_local. Must contain x-company-id and x-user-id headers.
    # example: {"x-company-id": "1234567890", "x-user-id": "1234567890"}
    serviceExtraHeaders:
      x-company-id: '{{ fail "connectorConfig.unique.serviceExtraHeaders.x-company-id is mandatory when authMode is cluster_local. Override in your deployment values." }}'
      x-user-id: '{{ fail "connectorConfig.unique.serviceExtraHeaders.x-user-id is mandatory when authMode is cluster_local. Override in your deployment values." }}'
    # -- Optional object containing config to pass when submitting file for ingestion
    # ingestionConfig:
    #   uniqueIngestionMode: SKIP_INGESTION
    #   customProperty: value
    # -- Zitadel authentication configuration (required when authMode is external)
    zitadel:
      # -- Zitadel client ID
      clientId: '{{ fail "connectorConfig.unique.zitadel.clientId is mandatory when authMode is external. Override in your deployment values." }}'
      # -- Zitadel OAuth token URL
      # example: https://idp.unique.app/oauth/v2/token
      oauthTokenUrl: '{{ fail "connectorConfig.unique.zitadel.oauthTokenUrl is mandatory when authMode is external. Override in your deployment values." }}'
      # -- Zitadel project ID
      # example: 225317577440629999
      projectId: '{{ fail "connectorConfig.unique.zitadel.projectId is mandatory when authMode is external. Override in your deployment values." }}'
      # clientSecret is loaded from a secret, see envVars

  processing:
    # -- timeout in seconds for a file processing step before it will stop and skip processing the file
    stepTimeoutSeconds: 300
    # -- how many files you want to submit for ingestion into Unique at once
    concurrency: 1
    # -- list of allowed MIME types for files to sync
    allowedMimeTypes:
      - application/pdf
      - text/plain
      - text/html
      - application/x-asp
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - text/csv
    # -- map of file extension suffix to canonical MIME type, used to override the SharePoint-reported mimeType. User-supplied values replace the default wholesale; include `.csv` in custom maps to retain the CSV fix
    mimeTypeOverridesByExtension:
      .csv: text/csv
    maxFileSizeToIngestBytes: null
    # -- cron expression for the scheduled SharePoint scan interval default: every 15 minutes
    scanIntervalCron: "*/15 * * * *"

# -- HTTP proxy configuration for external API calls
# Required for environments where internet access is only available through a proxy.
proxyConfig:
  enabled: true
  # -- Proxy authentication mode
  # none: proxy disabled
  # no_auth: proxy enabled, no authentication
  # username_password: username/password authentication
  # ssl_tls: TLS client certificate authentication
  authMode: none
  # -- Proxy server hostname (required for no_auth/username_password/ssl_tls modes)
  # host: proxy.example.com
  # -- Proxy server port (required for no_auth/username_password/ssl_tls modes)
  # port: 8080
  # -- Proxy protocol: http or https (required for no_auth/username_password/ssl_tls modes)
  # protocol: http
  # -- Basic auth username (required for username_password mode)
  # username: proxy-user
  # password is loaded from a secret, see envVars example for PROXY_PASSWORD
  # -- Path to SSL/TLS client certificate (required for ssl_tls mode)
  # sslCertPath: /app/proxy-certs/client.crt
  # -- Path to SSL/TLS client key (required for ssl_tls mode)
  # sslKeyPath: /app/proxy-certs/client.key
  # -- Path to CA bundle for verifying proxy server certificate (optional)
  # sslCaBundlePath: /app/proxy-certs/ca.crt
  # -- Optional JSON string of headers for CONNECT request
  # headers: '{"X-Proxy-Header":"value"}'

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
  baseline:
    prometheus:
      namespace: system
    egress:
      microsoft:
        toFQDNs:
          - matchName: login.microsoftonline.com
          - matchPattern: "*.sharepoint.com"
          - matchName: graph.microsoft.com
          - matchPattern: "*.microsoft.com"
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
