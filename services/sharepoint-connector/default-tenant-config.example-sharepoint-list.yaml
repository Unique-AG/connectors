# SharePoint Connector - Dynamic Configuration Example
# Sites are loaded from a SharePoint list
sharepoint:
  tenantId: your-tenant-id-here
  auth:
    mode: certificate
    clientId: your-client-id-here
    privateKeyPath: /path/to/private-key.pem
    thumbprintSha1: your-sha1-thumbprint-here
  baseUrl: https://yourcompany.sharepoint.com
  graphApiRateLimitPerMinuteThousands: 6
  # Deployment-level defaults applied to every list row; per-row values
  # always win when set. Any field except siteId may be defaulted here, so
  # rows can leave columns blank and inherit the values below.
  siteDefaults:
    syncColumnName: FinanceGPTKnowledge
    storeInternally: enabled
    syncStatus: active
    syncMode: content_only
    permissionsInheritanceMode: inherit_scopes_and_files
    subsitesScan: disabled
  # Sites configuration from SharePoint list
  sitesSource: sharepoint_list
  sharepointList:
    siteId: your-config-site-id-here
    listId: your-config-list-guid-here
  # SharePoint list columns (only siteId is mandatory per row; everything
  # else falls back to siteDefaults above when blank):
  # - siteId (Single line text) - SharePoint site ID
  # - syncColumnName (Single line text) - Column that marks files for sync
  # - ingestionMode (Choice: flat, recursive)
  # - uniqueScopeId (Single line text) - Unique scope ID; either `scope_<id>` or `in_parent:scope_<parentId>`
  # - maxFilesToIngest (Number, optional)
  # - storeInternally (Choice: enabled, disabled)
  # - syncStatus (Choice: active, inactive, deleted)
  # - syncMode (Choice: content_only, content_and_permissions)
  # - permissionsInheritanceMode (Choice: inherit_scopes_and_files, inherit_scopes, inherit_files, none)
  # - subsitesScan (Choice: enabled, disabled)
unique:
  serviceAuthMode: cluster_local
  serviceExtraHeaders:
    x-company-id: your-company-id
    x-user-id: your-user-id
  ingestionServiceBaseUrl: https://ingestion.your-unique-instance.com
  scopeManagementServiceBaseUrl: https://scope-management.your-unique-instance.com
  apiRateLimitPerMinute: 60
processing:
  stepTimeoutSeconds: 300
  concurrency: 5
  maxFileSizeToIngestBytes: 52428800
  allowedMimeTypes:
    - application/pdf
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - application/vnd.openxmlformats-officedocument.presentationml.presentation
    - text/plain
    - text/html
    - text/csv
  # Map of file extension suffix to canonical MIME type. Overrides the SharePoint-reported
  # mimeType before the allow-list check (e.g. SharePoint reports `.csv` files as
  # `application/vnd.ms-excel`). User-supplied values replace the default wholesale; include
  # `.csv` in custom maps to retain the CSV fix.
  # mimeTypeOverridesByExtension:
  #   .csv: text/csv
  scanIntervalCron: "*/15 * * * *"
