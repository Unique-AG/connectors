openapi: 3.0.3
info:
  title: Kyckr Companies V2 API
  version: '2.0'
  contact:
    url: 'https://www.kyckr.com'
  description: |
    Kyckr Companies V2 API

    ## Changelog

    | Date       | Change Description | Notes |
    |------------|-------------------|-------|
    | 2026-04 | Profile extensions and address geocoding:<br>- New `extend` query parameter (comma-separated string) on GET Enhanced Profile for per-account profile extensions.<br>- `geocoding` is the first available extension type, providing parsed and geocoded address information via the `additionalInformation` response object.<br>- New schemas: AdditionalInformation, AddressAdditionalInformation, InformationSource.<br>- `Address` now has an `identifier` field, consistent per address, linking to the `additionalInformation.addressInformation` geocoding data.<br>- Supports extensible extension types: future types (e.g. firmographics, activity codes) to follow.<br>- Unrecognised or unauthorised values are silently ignored. | Opt-in feature. Per-account entitlements. Additional cost per extension type. |
    | 2026-03 | Added otherIdentifiers array to CorporationDetails schema, enabling typed identifiers (ACN, ABN, ARBN, ARSN, ARFN, foreign registration numbers) on corporate representatives and shareholders. | Driven by AU ASIC mapping where corporate officers and shareholders carry multiple identifier types. Reuses existing Identifier schema. |
    | 2026-02 | Shareholding percentage range support:<br>- Shareholding.percentage is now nullable. When the registry provides a range (e.g. unknown shareholding amount), percentage is null and percentageIsRange, percentageRange, percentageLowerLimit, percentageUpperLimit convey the range. | Supports jurisdictions such as EE where ownership may be reported as a range (e.g. "0-100%"). |
    | 2026-02 | Enhanced Profile – company relationships and registration type:<br>- Added companyRelationships array for future relational extract data (subsidiaries; company evolution – merged, demerged, acquired). Parent/ultimate parent/immediate parent remain in roles and corporate representatives; branch/establishments are covered by a separate establishments model.<br>- Added registrationType and registrationTypeDetails to Enhanced Profile for capturing foreign registered body and details at the source registry when available. | Company relationships support subsidiary and evolution history; registration type fields support jurisdiction-specific registration classification. |
    | 2026-02 | Enhanced Profile – POST /companies/{kyckrId}/enhanced to request enhanced profile (same resource as GET; POST creates an order, no timeout). GET returns 405 for async-only jurisdictions; use POST instead. | Coming soon |
    | 2026-02 | Added otherIdentifiers array with type codes to Search results (V2 API has a single search endpoint; identifiers appear in that search result) | Enables jurisdiction-specific identifier types in Search results |
    | 2025-10 | Field consistency improvements across profiles:<br>- Created reusable AlternativeNames and PreviousNames schema components<br>- Standardized previousNames structure with proper schema references<br>- Added registrationDate to LiteProfile schema<br>- Added lastAnnualAccountDate to LiteProfile schema<br>- Added registeredAgentName and registeredAgentAddress to BasicProfile schema<br>- Aligns LiteProfile date fields with V1 and EnhancedProfile<br>- Aligns BasicProfile/EnhancedProfile with V1 for registered agent information<br>- Improves schema reusability and consistency across V2 API |
    | 2025-07 | Additional properties added<br/>Corrected 'Get Order' API response documentation |  - Future SearchResults previous names <br/>- Future Enhanced Profile properties: UBO kind, last annual account date, description of voting rights from the registry.  |
    | 2025-03 | Capital and Shareholding simplification<br>Deprecated tradingName in favor of alias<br>New OtherIdentifiers with jurisdiction-specific type codes | Deprecated fields flagged<br><br>OtherIdentifiers will evolve with additional type codes per jurisdiction |
    | 2025-02   | - New field - Enhanced Profile - capital[].shareholdings[].beneficiallyHeld<br>- Added "Other" category in corporations/individuals arrays for ambiguous entity types | - Future AU update<br>- Handles cases where registry source data cannot definitively identify entity type |
    | 2025-02    | Documentation corrections - Enhanced Profile - ultimateBeneficialOwners field descriptions | |
    | 2025-01    | Documentation corrections - Enhanced Profile - ultimateBeneficialOwners | |
    | 2024-11    | Preview feature UBO Verify | Subject to change - limited Beta trial only |
