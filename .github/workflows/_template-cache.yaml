name: "[TEMPLATE] Cache Warming"

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (e.g., sharepoint-connector)"
        required: true
        type: string
      service-path:
        description: "Path to the services directory (e.g., services/sharepoint-connector)"
        required: true
        type: string

permissions:
  contents: read
  packages: read
  actions: read

env:
  SERVICE_PATH: ${{ inputs.service-path }}
  CHART_REPO: ghcr.io/unique-ag/connectors/services/${{ inputs.service-name }}
  GHA_CACHE_SCOPE: ${{ inputs.service-name }}

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Skip if no changes in last 3 days under ${{ inputs.service-path }}
        run: |
          if ! git log --since="3 days ago" --name-only --pretty=format: | grep -q '^${{ inputs.service-path }}/'; then
            echo "No recent changes; skipping warm."
            exit 0
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-warm GHA cache (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: ${{ inputs.service-path }}/deploy/Dockerfile
          context: .
          platforms: linux/amd64
          push: false
          provenance: false

          cache-from: |
            type=gha,scope=${{ env.GHA_CACHE_SCOPE }}
            type=registry,ref=${{ env.CHART_REPO }}:cache

          cache-to: |
            type=gha,scope=${{ env.GHA_CACHE_SCOPE }},mode=max,ignore-error=true

