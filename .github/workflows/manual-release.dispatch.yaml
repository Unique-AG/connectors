name: "Manual Release Re-Run"

permissions:
  contents: read
  packages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to re-release"
        required: true
        type: choice
        options:
          - teams-mcp
          - sharepoint-connector
          - outlook-semantic-mcp
          - confluence-connector
      existing-version:
        description: "Existing version of the service (e.g. 0.2.15)"
        required: true
        type: string

jobs:
  manual-release:
    uses: ./.github/workflows/_template-cd.yaml
    secrets: inherit
    with:
      service-name: ${{ inputs.service }}
      service-version: ${{ inputs.existing-version }}
      dockerfile: services/${{ inputs.service }}/deploy/Dockerfile
