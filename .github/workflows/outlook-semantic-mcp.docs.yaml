name: "[outlook-semantic-mcp] Publish Docs to Confluence"

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_call:

jobs:
  publish-docs:
    uses: ./.github/workflows/_template-docs-confluence.yaml
    secrets: inherit
    with:
      service-name: outlook-semantic-mcp
      docs-path: services/outlook-semantic-mcp/docs
